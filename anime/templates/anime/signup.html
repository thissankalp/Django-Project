{% extends 'anime/base.html' %}

{% block content %}
  <section class="section form-section">
    <div class="section-title">
      <h2>Sign up</h2>
      <p>Create an account to save your favorite anime picks.</p>
    </div>
    <form class="form-card" method="post">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <label>
        Username
        {{ form.username }}
      </label>
      <label>
        Email
        {{ form.email }}
      </label>
      <label>
        Password
        {{ form.password1 }}
      </label>
      <label>
        Confirm password
        {{ form.password2 }}
      </label>
      <button class="btn btn-primary" type="submit">Create account</button>
    </form>
  </section>
{% endblock %}
