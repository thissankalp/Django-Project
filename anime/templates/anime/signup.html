{% extends 'anime/base.html' %}

{% block content %}
  <section class="section form-section">
    <div class="section-title">
      <h2>Sign up</h2>
      <p>Create an account to save your favorite anime picks.</p>
    </div>
    <form class="form-card" method="post">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <label>
        Username
        {{ form.username }}
        {{ form.username.errors }}
      </label>
      <label>
        Email
        {{ form.email }}
        {{ form.email.errors }}
      </label>
      <label>
        Password
        {{ form.password1 }}
        {{ form.password1.errors }}
      </label>
      <label>
        Confirm password
        {{ form.password2 }}
        {{ form.password2.errors }}
      </label>
      <button class="btn btn-primary" type="submit">Create account</button>
    </form>
    <p class="form-note">
      Already have an account?
      <a href="{% url 'login' %}">Log in here</a>.
    </p>
  </section>
{% endblock %}
