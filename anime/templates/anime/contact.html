{% extends 'anime/base.html' %}

{% block content %}
  <section class="section form-section">
    <div class="section-title">
      <h2>Contact us</h2>
      <p>Tell us what you want to watch or any feature ideas.</p>
    </div>
    <form class="form-card" method="post">
      {% csrf_token %}
      <div class="form-grid">
        <label>
          Name
          {{ form.name }}
        </label>
        <label>
          Email
          {{ form.email }}
        </label>
      </div>
      <label>
        Topic
        {{ form.topic }}
      </label>
      <label>
        Message
        {{ form.message }}
      </label>
      <button class="btn btn-primary" type="submit">Send message</button>
    </form>
  </section>
{% endblock %}
